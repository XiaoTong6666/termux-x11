name: nightly-termux-x11-loader-master

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - '**.md'
      - 'img/**'

permissions:
  contents: write

concurrency:
  group: nightly-termux-x11-loader-master
  cancel-in-progress: true

jobs:
  build-loader:
    name: build-loader
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-termux-x11-loader-master-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-termux-x11-loader-master-
            ${{ runner.os }}-gradle-

      - name: Build external loader
        run: ./gradlew :shell-loader:assembleDebug

      - name: Stage release artifacts
        run: |
          mkdir -p dist
          cp shell-loader/build/outputs/apk/debug/shell-loader-debug.apk dist/aisle_x11_loader.apk
          (
            cd dist
            sha256sum aisle_x11_loader.apk > SHA256SUMS
          )

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-termux-x11-loader-master-payload
          path: |
            dist/aisle_x11_loader.apk
            dist/SHA256SUMS
          if-no-files-found: error

  publish-nightly:
    name: publish-nightly
    runs-on: ubuntu-latest
    needs: build-loader

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: nightly-termux-x11-loader-master-payload
          path: dist

      - name: Move nightly tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f nightly-termux-x11-loader-master "${GITHUB_SHA}"
          git push origin refs/tags/nightly-termux-x11-loader-master --force

      - name: Recreate nightly release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view nightly-termux-x11-loader-master >/dev/null 2>&1 && gh release delete nightly-termux-x11-loader-master --yes || true
          gh release create nightly-termux-x11-loader-master \
            dist/aisle_x11_loader.apk \
            dist/SHA256SUMS \
            --title "nightly-termux-x11-loader-master" \
            --notes "Automated nightly external loader build for ${GITHUB_SHA}."
